name: Label commenter
on:
  issues:
    types: [labeled, unlabeled]
  pull_request_target:
    types: [labeled, unlabeled]
jobs:
  label-commenter:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: technote-space/label-commenter-action@v3
        with:
          config-file: .github/label-commenter-config.yml
          repo-token: ${{ secrets.GITHUB_TOKEN }}
