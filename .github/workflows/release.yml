on:
  release:
    types: [created, published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build (e.g. v2.0.1)
        required: true
        type: string
name: Handle Release
env:
  DOCKER_HUB_USER: niteesh20
  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
  CHECKOUT_REF: ${{ github.event_name == 'workflow_dispatch' && github.sha || (github.event.release.tag_name || github.event.inputs.tag) }}
jobs:
  gate:
    name: Check release credentials
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.check.outputs.docker }}
      artifacts: ${{ steps.check.outputs.artifacts }}
    steps:
      - id: check
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          PGP_SIGNING_KEY: ${{ secrets.PGP_SIGNING_KEY }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            echo "docker=true" >> "$GITHUB_OUTPUT"
            echo "Docker publish: enabled"
          else
            echo "docker=false" >> "$GITHUB_OUTPUT"
            echo "Docker publish: skipped (set DOCKER_USERNAME and DOCKER_PASSWORD secrets)"
          fi
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ] && [ -n "$PGP_SIGNING_KEY" ] && [ -n "$PGP_PASSPHRASE" ]; then
            echo "artifacts=true" >> "$GITHUB_OUTPUT"
            echo "Release artifacts: enabled"
          else
            echo "artifacts=false" >> "$GITHUB_OUTPUT"
            echo "Release artifacts: skipped (requires Docker + PGP secrets)"
          fi

  builder:
    name: Generate builder containers
    needs: gate
    if: needs.gate.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - name: Set the environment variables
        run: |
          echo "GOLANG_VERSION=$(grep -m 1 GOLANG_VERSION Makefile | sed 's/^.*= //g')" >> $GITHUB_ENV
          echo "ALPINE_VERSION=$(grep -m 1 ALPINE_VERSION Makefile | sed 's/^.*= //g')" >> $GITHUB_ENV
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: niteesh20/builder
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}},value=${{ env.RELEASE_TAG }}
            type=raw,value=latest
      - name: Docker meta
        id: meta-linux-generic
        uses: docker/metadata-action@v4
        with:
          images: niteesh20/builder
          flavor: |
            suffix=-linux-generic,onlatest=true
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}},value=${{ env.RELEASE_TAG }}
            type=raw,value=latest-linux-generic
      - name: Build and push Pucora plugin builder (Alpine)
        id: container-build
        uses: docker/build-push-action@v2
        with:
          context: .
          file: Dockerfile-builder
          build-args: |
            GOLANG_VERSION=${{ env.GOLANG_VERSION }}
            ALPINE_VERSION=${{ env.ALPINE_VERSION }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Build and push Pucora plugin builder (Linux generic)
        id: container-build-linux-generic
        uses: docker/build-push-action@v2
        with:
          context: .
          file: Dockerfile-builder-linux
          build-args: |
            GOLANG_VERSION=${{ env.GOLANG_VERSION }}
          push: true
          tags: ${{ steps.meta-linux-generic.outputs.tags }}
          labels: ${{ steps.meta-linux-generic.outputs.labels }}

  generate:
    name: Create release-artifacts
    needs: [gate, builder]
    if: needs.gate.outputs.artifacts == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - name: Set release version
        run: echo "RELEASE_VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v5
        with:
          gpg_private_key: ${{ secrets.PGP_SIGNING_KEY }}
          passphrase: ${{ secrets.PGP_PASSPHRASE }}
      - name: List keys
        run: gpg -K
      - name: Generate the artifacts for Debian/Ubuntu/Redhat/Centos (AMD64/ARM64)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/github/workspace" \
            -w /github/workspace \
            "niteesh20/builder:${RELEASE_VERSION}-linux-generic" \
            sh -c "git config --global --add safe.directory /github/workspace;
             export CGO_ENABLED=1 CC=aarch64-linux-gnu-gcc ARCH=arm64 OS_TAG=_generic-linux GOARCH=arm64 GOHOSTARCH=amd64 EXTRA_LDFLAGS='-extld=aarch64-linux-gnu-gcc';
             make -e build && make -e tgz;
             make clean;
             export CC= GOARCH=amd64 ARCH=amd64 OS_TAG=_generic-linux EXTRA_LDFLAGS=;
             make -e build && make -e jwk-aggregator-plugin && make -e tgz;"
      - name: Build DEB package (AMD64)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/github/workspace" \
            -w /github/workspace \
            --entrypoint /bin/bash \
            niteesh20/fpm:deb \
            -c "make -e deb-release"
      - name: Build RPM package (AMD64)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/github/workspace" \
            -w /github/workspace \
            --entrypoint /bin/bash \
            niteesh20/fpm:rpm \
            -c "echo '${{ secrets.PGP_SIGNING_KEY }}' > pgp.key;
             gpg --import pgp.key;
             cp builder/files/rpmmacros /etc/rpm/macros;
             make -e rpm-release &&
             rpmsign --addsign *rpm"
      - name: Generate the artifacts for Alpine (AMD64/ARM64)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/github/workspace" \
            -w /github/workspace \
            "niteesh20/builder:${RELEASE_VERSION}" \
            sh -c "export GOARCH=amd64 ARCH=amd64 OS_TAG=_alpine;
             make -e build && make -e tgz;
             make clean;
             export CGO_ENABLED=1 ARCH=arm64 OS_TAG=_alpine GOARCH=arm64 GOHOSTARCH=amd64;
             export CC=aarch64-linux-musl-gcc EXTRA_LDFLAGS='-extldflags=-fuse-ld=bfd  -extld=aarch64-linux-musl-gcc';
             make -e build && make -e tgz"
      - name: ASC files
        run: for i in $(ls *.tar.gz *.deb *.rpm);
         do gpg --armor --detach $i;
         sha512sum $i >> checksums.txt;
         done
      - name: Cache artifacts
        id: cache
        uses: actions/cache/save@v4
        with:
          path: |
            *.tar.gz
            *.asc
            *.deb
            *.rpm
            checksums.txt
          key: ${{github.ref}}-artifacts

  upload:
    name: Upload release-artifacts
    needs: [gate, generate]
    if: needs.gate.outputs.artifacts == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      packages: write
      checks: write
      contents: write
      statuses: read
    steps:
      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            *.tar.gz
            *.asc
            *.deb
            *.rpm
            checksums.txt
          key: ${{github.ref}}-artifacts
      - name: Upload the artifacts
        uses: skx/github-action-publish-binaries@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: '*.tar.gz *.asc *.deb *.rpm checksums.txt'

  ce-docker:
    name: Publish CE Docker image
    needs: gate
    if: needs.gate.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Fetch JSON schema
        run: |
          curl -fsSL -o cmd/pucora-ce/schema/schema.json \
            https://raw.githubusercontent.com/pucora/pucora-schema/v2.0.4/v2.13/pucora.json

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build or retag Pucora image on Docker Hub
        run: |
          IMAGE_TAG="${RELEASE_TAG}"
          VERSION="${IMAGE_TAG#v}"
          set -eux

          if go mod tidy && go mod vendor; then
            docker build --pull \
              --build-arg GOLANG_VERSION=$(grep -m 1 GOLANG_VERSION Makefile | sed 's/^.*= //g') \
              --build-arg ALPINE_VERSION=$(grep -m 1 ALPINE_VERSION Makefile | sed 's/^.*= //g') \
              --build-arg VERSION="${VERSION}" \
              -t "niteesh20/pucora:${IMAGE_TAG}" \
              -t "niteesh20/pucora:${VERSION}" \
              .
          else
            echo "go mod vendor failed; retagging niteesh20/velonetics:${VERSION} as pucora"
            docker pull "niteesh20/velonetics:${VERSION}"
            docker tag "niteesh20/velonetics:${VERSION}" "niteesh20/pucora:${IMAGE_TAG}"
            docker tag "niteesh20/velonetics:${VERSION}" "niteesh20/pucora:${VERSION}"
          fi

          docker push "niteesh20/pucora:${IMAGE_TAG}"
          docker push "niteesh20/pucora:${VERSION}"

  helm-chart:
    name: Publish Helm chart to OCI
    needs: gate
    if: needs.gate.outputs.docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push Helm chart
        run: |
          APP_VERSION=${RELEASE_TAG#v}
          deploy/helm/scripts/verify-chart-version.sh "${APP_VERSION}"
          helm package deploy/helm/pucora \
            --version "${APP_VERSION}" \
            --app-version "${APP_VERSION}"
          helm push "pucora-${APP_VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"
          echo "Published oci://ghcr.io/${{ github.repository_owner }}/charts/pucora:${APP_VERSION}"
