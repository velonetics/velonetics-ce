name: Streaming Compose

on:
  push:
    branches: [main]
    paths:
      - 'examples/streaming/**'
      - 'docs/streaming-sse.md'
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
  pull_request:
    branches: [main]
    paths:
      - 'examples/streaming/**'
      - 'docs/streaming-sse.md'
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Fetch JSON schema
        run: |
          curl -fsSL -o cmd/velonetics-ce/schema/schema.json \
            https://raw.githubusercontent.com/pucora/velonetics-schema/v2.0.2/v2.13/pucora.json

      - name: Streaming Docker Compose smoke
        run: make sse-compose-test
