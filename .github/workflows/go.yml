name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: WebSocket published module tests
        run: |
          git clone --depth 1 --branch v2.0.1 https://github.com/velonetics/velonetics-websocket.git /tmp/velonetics-websocket
          cd /tmp/velonetics-websocket && go test -count=1 .

      - name: SOAP published module tests
        run: |
          git clone --depth 1 --branch v2.1.0 https://github.com/velonetics/velonetics-soap.git /tmp/velonetics-soap
          cd /tmp/velonetics-soap && go test -count=1 .

      - name: gRPC published module tests
        run: |
          git clone --depth 1 --branch v2.0.1 https://github.com/velonetics/velonetics-grpc.git /tmp/velonetics-grpc
          cd /tmp/velonetics-grpc && go test -count=1 ./...

      - name: Lura GraphQL module tests
        run: |
          git clone --depth 1 --branch v2.0.4 https://github.com/velonetics/lura.git /tmp/velonetics-lura
          cd /tmp/velonetics-lura && go test -count=1 ./transport/http/client/graphql/... ./proxy/... -run 'GraphQL|GetOptions|Resolve|ExtraConfig'

      - name: Fetch JSON schema
        run: |
          curl -fsSL -o cmd/velonetics-ce/schema/schema.json \
            https://raw.githubusercontent.com/velonetics/velonetics-schema/v2.0.2/v2.13/velonetics.json

      - name: Build
        run: |
          VERSION=$(grep '^VERSION :=' Makefile | awk '{print $3}')
          go build -ldflags="-X github.com/velonetics/lura/v2/core.VeloneticsVersion=${VERSION}" \
            -o velonetics ./cmd/velonetics-ce

      - name: Validate WebSocket fixtures
        run: |
          ./velonetics check -c tests/fixtures/ws_direct.json
          ./velonetics check -c tests/fixtures/ws_multiplex.json
          ./velonetics check -c tests/fixtures/ws_jwt.json
          ./velonetics check -c velonetics-ws.json
          ./velonetics check -c tests/fixtures/soap_country.json
          ./velonetics check -c tests/fixtures/grpc_client.json
          ./velonetics check -c tests/fixtures/grpc_client_mapping.json
          ./velonetics check -c tests/fixtures/grpc_server.json
          ./velonetics check -c tests/fixtures/grpc_server_mixed.json
          ./velonetics check -c tests/fixtures/grpc_server_jwt.json
          ./velonetics check -c tests/fixtures/graphql_mutation_post.json
          ./velonetics check -c tests/fixtures/graphql_query_get.json
          ./velonetics check -c tests/fixtures/graphql_query_path.json
          ./velonetics check -c tests/fixtures/graphql_proxy.json
          ./velonetics check -c tests/fixtures/graphql_proxy_cors.json
          ./velonetics check -c tests/fixtures/graphql_federation.json
          ./velonetics check -c tests/fixtures/graphql_jwt.json
          ./velonetics check -c tests/fixtures/graphql_ratelimit.json

      - name: GraphQL integration test
        run: cd tests && go test -count=1 -run TestGraphQLIntegration -timeout 2m

      - name: WebSocket integration test
        run: cd tests && go test -count=1 -run TestWebSocket -timeout 2m

      - name: Unit tests
        run: go test $(go list ./... | grep -vE '/tests$|/cmd/velonetics-integration')
