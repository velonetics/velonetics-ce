# Default values for pucora.

replicaCount: 2

image:
  repository: niteesh20/pucora
  tag: "2.2.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

rbac:
  create: false
  rules: []
  # - apiGroups: [""]
  #   resources: ["configmaps"]
  #   verbs: ["get", "list", "watch"]

podAnnotations: {}
podLabels: {}

# GitOps ordering annotations (Argo CD, Flux).
gitops:
  argocd:
    enabled: false
    syncWave: ""
  flux:
    enabled: false
    reconcile: ""

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsUser: 1000
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

terminationGracePeriodSeconds: 30

lifecycle:
  preStop:
    enabled: true
    sleepSeconds: 5

priorityClassName: ""
dnsConfig: {}
hostAliases: []

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  annotations: {}
  sessionAffinity: ""
  sessionAffinityConfig: {}
  loadBalancerIP: ""
  loadBalancerClass: ""
  externalTrafficPolicy: ""
  loadBalancerSourceRanges: []
  nlb:
    enabled: false
    annotations: {}
    labels: {}
    loadBalancerIP: ""
    loadBalancerClass: ""
    externalTrafficPolicy: Local
    loadBalancerSourceRanges: []

metrics:
  enabled: true
  port: 8090
  service:
    annotations: {}

config:
  # "configmap", "secret", "image", or "configurator" (load from configurator API).
  mode: configmap
  existingConfigMap: ""
  existingSecret: ""
  # Used when mode is "configurator" (requires configurator.enabled).
  configurator:
    configName: default
    apiKeySecret: ""
    apiKeySecretKey: api-key
  pucoraJson: |
    {
      "version": 3,
      "name": "Pucora Gateway",
      "port": 8080,
      "extra_config": {
        "telemetry/logging": {
          "level": "INFO",
          "prefix": "[PUCORA]",
          "stdout": true
        },
        "telemetry/metrics": {
          "collection_time": "60s",
          "listen_address": ":8090"
        },
        "telemetry/usage": {
          "enabled": false
        }
      },
      "endpoints": [
        {
          "endpoint": "/__debug",
          "backend": [
            {
              "url_pattern": "/__debug"
            }
          ]
        }
      ]
    }

usageReporting:
  disable: true

opentelemetry:
  enabled: false
  endpoint: ""
  serviceName: ""
  # Adds OTEL_* env vars when enabled.

command: []
args:
  - run
  - -c
  - /etc/pucora/pucora.json
  - -p
  - "8080"

extraEnv: []
extraEnvFrom: []

extraVolumes: []
extraVolumeMounts: []

sidecarInjection:
  enabled: false
  istio:
    enabled: false
    inject: true
    holdApplicationUntilProxyStarts: false
  linkerd:
    enabled: false
    inject: enabled
  annotations: {}

sidecars: []
initContainers: []

resources: {}

probes:
  startup:
    enabled: false
    path: /__health
    port: http
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
  liveness:
    path: /__health
    port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /__health
    port: http
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

podAntiAffinity:
  enabled: false
  type: soft

topologySpreadConstraints: []

nodeSelector: {}
tolerations: []
affinity: {}

networkPolicy:
  enabled: false
  allowIngressController: true
  ingressControllerNamespace: ""
  allowMetricsScraper: true
  metricsNamespace: ""
  additionalIngress: []

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: pucora.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

certificate:
  enabled: false
  secretName: ""
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames: []
  duration: ""
  renewBefore: ""

httpRoute:
  enabled: false
  parentRefs: []
  # - name: main-gateway
  #   namespace: gateway-system
  hostnames: []
  # - api.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

keda:
  enabled: false
  minReplicaCount: 2
  maxReplicaCount: 10
  pollingInterval: 30
  cooldownPeriod: 300
  triggers: []
  # - type: prometheus
  #   metadata:
  #     serverAddress: http://prometheus:9090
  #     query: sum(rate(http_requests_total{service="pucora"}[2m]))
  #     threshold: "100"

podDisruptionBudget:
  enabled: false
  minAvailable: 1

serviceMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

podMonitor:
  enabled: false
  namespace: ""
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

prometheusRule:
  enabled: false
  namespace: ""
  labels: {}
  rules: []
  # - alert: PucoraDown
  #   expr: up{job="pucora"} == 0
  #   for: 5m
  #   labels:
  #     severity: critical
  #   annotations:
  #     summary: Pucora gateway is down

tests:
  enabled: true
  configCheck: true

# Optional Pucora Configurator UI + API for authoring gateway configuration.
# Source: https://github.com/pucora/pucora-configurator
configurator:
  enabled: false

  api:
    image:
      repository: ghcr.io/pucora/pucora-config-api
      tag: "2.2.0"
      pullPolicy: IfNotPresent
    replicaCount: 1
    service:
      port: 8081
      annotations: {}
    auth:
      # Plain-text key creates a chart-managed Secret (prefer existingSecret in prod).
      apiKey: ""
      existingSecret: ""
      secretKey: api-key
    env:
      CONFIG_STORE_PATH: /data
      ALLOWED_ORIGINS: ""
      PUBLIC_BASE_URL: ""
    extraEnv: []
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  web:
    image:
      repository: ghcr.io/pucora/pucora-config-web
      tag: "2.2.0"
      pullPolicy: IfNotPresent
    replicaCount: 1
    service:
      port: 80
      annotations: {}
    resources: {}
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: configurator.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  gateway:
    # Init container fetches /api/config/{configName}/pucora.json at pod start.
    initImage:
      repository: curlimages/curl
      tag: "8.11.1"
      pullPolicy: IfNotPresent
    fetchRetries: 60
    fetchRetrySeconds: 2
