{{- if and .Values.configurator.enabled .Values.configurator.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "pucora.configuratorWebName" . }}
  labels:
    {{- include "pucora.labels" . | nindent 4 }}
    app.kubernetes.io/component: configurator-web
  {{- with .Values.configurator.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.configurator.ingress.className }}
  ingressClassName: {{ .Values.configurator.ingress.className }}
  {{- end }}
  {{- if .Values.configurator.ingress.tls }}
  tls:
    {{- range .Values.configurator.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.configurator.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "pucora.configuratorWebName" $ }}
                port:
                  number: {{ $.Values.configurator.web.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
