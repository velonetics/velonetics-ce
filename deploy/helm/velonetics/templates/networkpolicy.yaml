{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pucora.fullname" . }}
  labels:
    {{- include "pucora.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pucora.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
      {{- if or .Values.networkPolicy.allowIngressController .Values.networkPolicy.additionalIngress }}
      from:
        {{- if .Values.networkPolicy.allowIngressController }}
        - namespaceSelector: {}
        {{- end }}
        {{- with .Values.networkPolicy.additionalIngress }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    {{- if and .Values.metrics.enabled .Values.networkPolicy.allowMetricsScraper }}
    - ports:
        - protocol: TCP
          port: {{ .Values.metrics.port }}
      {{- if .Values.networkPolicy.metricsNamespace }}
      from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.metricsNamespace }}
      {{- else }}
      from:
        - namespaceSelector: {}
      {{- end }}
    {{- end }}
{{- end }}
