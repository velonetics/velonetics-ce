services:
  mock-backend:
    build: ./mock-backend
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "/usr/local/bin/mock-graphql", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  pucora:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VERSION: "2.2.0"
    ports:
      - "8080:8080"
    volumes:
      - ./pucora.json:/etc/pucora/pucora.json:ro
      - ./graphql:/etc/pucora/graphql:ro
    depends_on:
      mock-backend:
        condition: service_healthy
    command: ["run", "-c", "/etc/pucora/pucora.json"]
