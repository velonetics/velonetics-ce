services:
  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"

  pucora:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VERSION: "2.2.0"
    ports:
      - "8080:8080"
    environment:
      NATS_SERVER_URL: nats://nats:4222
    volumes:
      - ./pucora.json:/etc/pucora/pucora.json:ro
    depends_on:
      - nats
    command: ["run", "-c", "/etc/pucora/pucora.json"]
