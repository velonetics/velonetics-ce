services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  pucora:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VERSION: "2.2.0"
    ports:
      - "8080:8080"
    environment:
      RABBIT_SERVER_URL: guest:guest@rabbitmq:5672
    volumes:
      - ./pucora.json:/etc/pucora/pucora.json:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: ["run", "-c", "/etc/pucora/pucora.json"]
