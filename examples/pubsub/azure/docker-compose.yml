services:
  sqledge:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Pucora_PubSub_2025!"
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "Pucora_PubSub_2025!" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  servicebus-emulator:
    build:
      dockerfile_inline: |
        FROM alpine:latest AS download
        RUN apk add --no-cache curl jq && \
            curl -sSfL "https://raw.githubusercontent.com/jeremy-morren/azure-service-bus-emulator-healthcheck/main/Download.sh" \
            | /bin/sh -s - /Healthcheck
        FROM mcr.microsoft.com/azure-messaging/servicebus-emulator:latest AS final
        COPY --from=download --chmod=500 /Healthcheck /Healthcheck
    ports:
      - "5672:5672"
      - "5300:5300"
    volumes:
      - ./config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    environment:
      SQL_SERVER: sqledge
      MSSQL_SA_PASSWORD: "Pucora_PubSub_2025!"
      ACCEPT_EULA: "Y"
      EMULATOR_HTTP_PORT: 5300
    depends_on:
      sqledge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/Healthcheck/ServiceBusEmulator.Healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_interval: 3s
      start_period: 5s

  pucora:
    build:
      context: ../../..
      dockerfile: Dockerfile
      args:
        VERSION: "2.2.0"
    ports:
      - "8080:8080"
    environment:
      SERVICEBUS_CONNECTION_STRING: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
    volumes:
      - ./pucora.json:/etc/pucora/pucora.json:ro
    depends_on:
      servicebus-emulator:
        condition: service_started
    command: ["run", "-c", "/etc/pucora/pucora.json"]
