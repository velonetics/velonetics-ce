services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --mode dev-container
      - --smp 1
      - --memory 512M
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  pucora:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VERSION: "2.2.0"
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    volumes:
      - ./pucora.json:/etc/pucora/pucora.json:ro
    depends_on:
      redpanda:
        condition: service_healthy
    command: ["run", "-c", "/etc/pucora/pucora.json"]
