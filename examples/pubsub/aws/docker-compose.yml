services:
  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      AWS_DEFAULT_REGION: us-east-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  localstack-init:
    image: amazon/aws-cli:2.17.49
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail
        aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name events
        echo "LocalStack SQS queue created"

  velonetics:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VERSION: "2.0.0"
    ports:
      - "8080:8080"
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
    volumes:
      - ./velonetics.json:/etc/velonetics/velonetics.json:ro
    depends_on:
      localstack-init:
        condition: service_completed_successfully
    command: ["run", "-c", "/etc/velonetics/velonetics.json"]
